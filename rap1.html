<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Price Alert MVP</title>
    <style>
      body {
        font-family: Arial, sans-serif;
        margin: 0;
        padding: 20px;
        background-color: #f4f4f4;
      }
      .container {
        max-width: 800px;
        margin: 0 auto;
        background-color: white;
        padding: 20px;
        border-radius: 8px;
        box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
      }
      h1 {
        color: #333;
        text-align: center;
      }
      .alert-form {
        margin-bottom: 20px;
      }
      .form-group {
        margin-bottom: 15px;
      }
      label {
        display: block;
        margin-bottom: 5px;
        font-weight: bold;
      }
      input,
      select {
        width: 100%;
        padding: 8px;
        border: 1px solid #ddd;
        border-radius: 4px;
        box-sizing: border-box;
      }
      button {
        background-color: #4caf50;
        color: white;
        padding: 10px 15px;
        border: none;
        border-radius: 4px;
        cursor: pointer;
        font-size: 16px;
      }
      button:hover {
        background-color: #45a049;
      }
      .alert-list {
        margin-top: 20px;
      }
      .alert-item {
        border: 1px solid #ddd;
        padding: 10px;
        margin-bottom: 10px;
        border-radius: 4px;
        background-color: #f9f9f9;
      }
      .alert-item.completed {
        background-color: #d4edda;
        border-color: #c3e6cb;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <h1>Price Alert MVP</h1>

      <div class="alert-form">
        <h2>Create New Alert</h2>
        <form id="alertForm">
          <div class="form-group">
            <label for="productName">Product Name:</label>
            <input type="text" id="productName" required />
          </div>
          <div class="form-group">
            <label for="targetPrice">Target Price:</label>
            <input type="number" id="targetPrice" step="0.01" required />
          </div>
          <div class="form-group">
            <label for="email">Email:</label>
            <input type="email" id="email" required />
          </div>
          <div class="form-group">
            <label for="store">Store:</label>
            <select id="store" required>
              <option value="">Select Store</option>
              <option value="amazon">Amazon</option>
              <option value="ebay">eBay</option>
              <option value="walmart">Walmart</option>
              <option value="bestbuy">Best Buy</option>
            </select>
          </div>
          <button type="submit">Create Alert</button>
        </form>
      </div>

      <div class="alert-list">
        <h2>Your Alerts</h2>
        <div id="alertsContainer">
          <!-- Alerts will be displayed here -->
        </div>
      </div>
    </div>

    <script>
      // Mock data for demonstration
      let alerts = [
        {
          id: 1,
          productName: "Wireless Headphones",
          targetPrice: 50,
          email: "user@example.com",
          store: "amazon",
          completed: false,
        },
        {
          id: 2,
          productName: "Smartphone Case",
          targetPrice: 15,
          email: "user@example.com",
          store: "ebay",
          completed: true,
        },
      ];

      function renderAlerts() {
        const container = document.getElementById("alertsContainer");
        container.innerHTML = "";

        alerts.forEach((alert) => {
          const alertDiv = document.createElement("div");
          alertDiv.className = `alert-item ${
            alert.completed ? "completed" : ""
          }`;
          alertDiv.innerHTML = `
                    <h3>${alert.productName}</h3>
                    <p>Target Price: $${alert.targetPrice}</p>
                    <p>Store: ${alert.store}</p>
                    <p>Email: ${alert.email}</p>
                    <p>Status: ${alert.completed ? "Completed" : "Active"}</p>
                `;
          container.appendChild(alertDiv);
        });
      }

      document
        .getElementById("alertForm")
        .addEventListener("submit", function (e) {
          e.preventDefault();

          const productName = document.getElementById("productName").value;
          const targetPrice = parseFloat(
            document.getElementById("targetPrice").value
          );
          const email = document.getElementById("email").value;
          const store = document.getElementById("store").value;

          const newAlert = {
            id: Date.now(),
            productName,
            targetPrice,
            email,
            store,
            completed: false,
          };

          alerts.push(newAlert);
          renderAlerts();

          // Reset form
          this.reset();

          alert("Alert created successfully!");
        });

      // Initial render
      renderAlerts();
    </script>
  </body>
</html>
